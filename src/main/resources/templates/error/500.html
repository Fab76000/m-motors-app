<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Erreur serveur - M-Motors</title>
    <meta name="description" th:if="${metaDescription != null}" th:attr="content=${metaDescription}" />
    <meta name="description" th:if="${metaDescription == null}" content="500 - Erreur interne du serveur : une erreur est survenue côté serveur. Veuillez réessayer plus tard." />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body class="bg-light">
<div class="container text-center mt-5">
    <h1 class="display-1 text-danger">500</h1>
    <h2>Erreur interne</h2>
    <p class="text-muted" th:text="${message}">Une erreur est survenue. Veuillez réessayer plus tard.</p>
    <a href="/" class="btn btn-primary">Retour à l'accueil</a>
</div>
</body>
</html>
