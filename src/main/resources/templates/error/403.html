<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accès refusé - M-Motors</title>
    <meta name="description" th:if="${metaDescription != null}" th:attr="content=${metaDescription}" />
    <meta name="description" th:if="${metaDescription == null}" content="403 - Accès refusé : vous n'avez pas les autorisations nécessaires pour accéder à cette ressource." />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body class="bg-light">
<div class="container text-center mt-5">
    <h1 class="display-1 text-danger">403</h1>
    <h2>Accès refusé</h2>
    <p class="text-muted" th:text="${message}">Vous n'avez pas les droits pour accéder à cette page.</p>
    <a href="/" class="btn btn-primary">Retour à l'accueil</a>
</div>
</body>
</html>
