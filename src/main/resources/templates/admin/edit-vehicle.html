<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un véhicule - M-Motors Admin</title>
    <meta name="description" th:if="${metaDescription != null}" th:attr="content=${metaDescription}" />
    <meta name="description" th:if="${metaDescription == null}" content="Modifier les informations d'un véhicule dans le catalogue M-Motors : caractéristiques, prix, statut." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<div th:replace="~{fragments/header :: header-admin}"></div>
<main>
    <div class="container my-5">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/admin">Dashboard</a></li>
                <li class="breadcrumb-item"><a href="/admin/vehicles">Véhicules</a></li>
                <li class="breadcrumb-item active" aria-current="page">Modifier</li>
            </ol>
        </nav>

        <!-- Header -->
        <div class="row mb-4">
            <div class="col">
                <h1 class="display-5">
                    <i class="bi bi-pencil text-primary"></i> Modifier un véhicule
                </h1>
                <p class="text-muted">
                    ID : <strong th:text="${vehicle.id}">1</strong> -
                    <span th:text="${vehicle.brand + ' ' + vehicle.model}">Peugeot 308</span>
                </p>
            </div>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fermer l'alerte d'erreur"></button>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <form th:action="@{/admin/vehicles/{id}/edit(id=${vehicle.id})}" method="post">

                    <div class="mb-4">
                        <label class="form-label fw-bold">Type de véhicule <span class="text-danger">*</span></label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="type" id="typeAchat" value="ACHAT"
                                   th:checked="${vehicle.type.name() == 'ACHAT'}" required>
                            <label class="btn btn-outline-success" for="typeAchat">
                                <i class="bi bi-cash-coin"></i> À vendre
                            </label>

                            <input type="radio" class="btn-check" name="type" id="typeLocation" value="LOCATION"
                                   th:checked="${vehicle.type.name() == 'LOCATION'}" required>
                            <label class="btn btn-outline-info" for="typeLocation">
                                <i class="bi bi-calendar-range"></i> En location
                            </label>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="brand" class="form-label">Marque <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="brand" name="brand"
                                   th:value="${vehicle.brand}" required>
                        </div>

                        <div class="col-md-6">
                            <label for="model" class="form-label">Modèle <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="model" name="model"
                                   th:value="${vehicle.model}" required>
                        </div>

                        <div class="col-md-4">
                            <label for="year" class="form-label">Année <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="year" name="year"
                                   th:value="${vehicle.year}" min="1990" max="2026" required>
                        </div>

                        <div class="col-md-4">
                            <label for="mileage" class="form-label">Kilométrage (km) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="mileage" name="mileage"
                                   th:value="${vehicle.mileage}" min="0" required>
                        </div>

                        <div class="col-md-4">
                            <label for="fuelType" class="form-label">Motorisation <span class="text-danger">*</span></label>
                            <select class="form-select" id="fuelType" name="fuelType" required>
                                <option th:each="fuel : ${'Essence,Diesel,Hybride,Électrique,GPL'.split(',')}"
                                        th:value="${fuel}"
                                        th:text="${fuel}"
                                        th:selected="${vehicle.fuelType == fuel}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="power" class="form-label">Puissance (ch) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="power" name="power"
                                   th:value="${vehicle.power}" min="50" required>
                        </div>

                        <div class="col-md-4">
                            <label for="gearbox" class="form-label">Boîte de vitesse <span class="text-danger">*</span></label>
                            <select class="form-select" id="gearbox" name="gearbox" required>
                                <option value="Manuelle" th:selected="${vehicle.gearbox == 'Manuelle'}">Manuelle</option>
                                <option value="Automatique" th:selected="${vehicle.gearbox == 'Automatique'}">Automatique</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="doors" class="form-label">Nombre de portes <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="doors" name="doors"
                                   th:value="${vehicle.doors}" min="2" max="5" required>
                        </div>

                        <div class="col-md-6">
                            <label for="color" class="form-label">Couleur <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="color" name="color"
                                   th:value="${vehicle.color}" required>
                        </div>

                        <div class="col-md-6">
                            <label for="status" class="form-label">Statut <span class="text-danger">*</span></label>
                            <select class="form-select" id="status" name="status" required>
                                <option value="DISPONIBLE" th:selected="${vehicle.status.name() == 'DISPONIBLE'}">Disponible</option>
                                <option value="RESERVE" th:selected="${vehicle.status.name() == 'RESERVE'}">Réservé</option>
                                <option value="VENDU" th:selected="${vehicle.status.name() == 'VENDU'}">Vendu</option>
                            </select>
                        </div>

                        <div class="col-md-6" id="priceField">
                            <label for="price" class="form-label">Prix de vente (€)</label>
                            <input type="number" class="form-control" id="price" name="price" step="0.01"
                                   th:value="${vehicle.price}">
                        </div>

                        <div class="col-md-6" id="monthlyRentField">
                            <label for="monthlyRent" class="form-label">Mensualité (€/mois)</label>
                            <input type="number" class="form-control" id="monthlyRent" name="monthlyRent" step="0.01"
                                   th:value="${vehicle.monthlyRent}">
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4"
                                      th:text="${vehicle.description}"></textarea>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> Enregistrer les modifications
                        </button>
                        <a href="/admin/vehicles" class="btn btn-secondary btn-lg">
                            <i class="bi bi-x-circle"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/script.js"></script>

</body>
</html>
