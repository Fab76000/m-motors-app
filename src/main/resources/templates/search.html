<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche de véhicules - M-Motors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
 <body class="bg-ligh d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header-client}"></div>
<main>
    <div class="container my-5">
        <div class="row mb-4">
            <div class="col">
                <h1 class="display-5">
                    <i class="bi bi-search text-primary"></i> Recherche de véhicules
                </h1>
                <p class="text-muted" th:if="${totalItems > 0}">
                    <span th:text="${totalItems}">0</span> véhicule(s) disponible(s)
                </p>
            </div>
        </div>

        <div class="card shadow mb-4">
            <div class="card-header bg-primary text-white">
                <i class="bi bi-funnel"></i> Filtres de recherche
            </div>
            <div class="card-body">
                <form method="get" action="/vehicles">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="type" class="form-label">Type</label>
                            <select class="form-select" id="type" name="type">
                                <option value="">Tous les types</option>
                                <option value="ACHAT" th:selected="${selectedType == 'ACHAT'}">Achat</option>
                                <option value="LOCATION" th:selected="${selectedType == 'LOCATION'}">Location</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="brand" class="form-label">Marque</label>
                            <input type="text"
                                   class="form-control"
                                   id="brand"
                                   name="brand"
                                   th:value="${selectedBrand}"
                                   placeholder="Ex: Geupeot, Nerault...">
                        </div>
                        <div class="col-md-4">
                            <label for="maxPrice" class="form-label">Prix maximum (€)</label>
                            <input type="number"
                                   class="form-control"
                                   id="maxPrice"
                                   name="maxPrice"
                                   th:value="${selectedMaxPrice}"
                                   placeholder="25000">
                        </div>
                    </div>

                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search"></i> Rechercher
                        </button>
                        <a href="/vehicles" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-clockwise"></i> Réinitialiser
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${totalItems == 0}">
            <div class="alert alert-info">
                <i class="bi bi-info-circle"></i>
                Aucun véhicule ne correspond à vos critères. Essayez d'élargir votre recherche.
            </div>
        </div>

        <div th:if="${totalItems > 0}">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                <div class="col" th:each="vehicle : ${vehicles}">
                    <div class="card h-100 shadow-sm">
                        <div class="position-relative">
                            <div style="width: 100%; height: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold;">
                                <span th:text="${vehicle.brand}">Marque</span>
                            </div>
                            <span class="position-absolute top-0 end-0 m-2 badge"
                                  th:classappend="${vehicle.type.name() == 'ACHAT'} ? 'bg-success' : 'bg-info'">
                                <span th:text="${vehicle.type.name() == 'ACHAT'} ? 'À vendre' : 'Location'">Type</span>
                            </span>
                        </div>

                        <div class="card-body">
                            <h5 class="card-title">
                                <span th:text="${vehicle.brand + ' ' + vehicle.model}">Marque Modèle</span>
                            </h5>
                            <div class="mb-3">
                                <small class="text-muted">
                                    <i class="bi bi-calendar"></i> <span th:text="${vehicle.year}">2023</span>
                                    &nbsp;•&nbsp;
                                    <i class="bi bi-speedometer2"></i> <span th:text="${#numbers.formatInteger(vehicle.mileage, 0, 'WHITESPACE')}">15 000</span> km
                                </small>
                                <br>
                                <small class="text-muted">
                                    <i class="bi bi-fuel-pump"></i> <span th:text="${vehicle.fuelType}">Essence</span>
                                    &nbsp;•&nbsp;
                                    <i class="bi bi-gear"></i> <span th:text="${vehicle.gearbox}">Manuelle</span>
                                </small>
                            </div>

                            <div class="mb-3">
                                <h4 class="text-primary mb-0" th:if="${vehicle.type.name() == 'ACHAT'}">
                                    <span th:text="${#numbers.formatDecimal(vehicle.price, 0, 'WHITESPACE', 0, 'POINT')}">18 500</span> €
                                </h4>
                                <h4 class="text-primary mb-0" th:if="${vehicle.type.name() == 'LOCATION'}">
                                    <span th:text="${#numbers.formatDecimal(vehicle.monthlyRent, 0, 'WHITESPACE', 0, 'POINT')}">450</span> €/mois
                                </h4>
                            </div>

                            <div class="d-flex gap-2 mb-3">
                                <span class="badge bg-secondary">
                                    <i class="bi bi-door-closed"></i> <span th:text="${vehicle.doors}">5</span> portes
                                </span>
                                <span class="badge bg-secondary">
                                    <i class="bi bi-lightning-charge"></i> <span th:text="${vehicle.power}">110</span> ch
                                </span>
                                <span class="badge bg-secondary">
                                    <i class="bi bi-palette"></i> <span th:text="${vehicle.color}">Blanc</span>
                                </span>
                            </div>
                        </div>

                        <div class="card-footer bg-white">
                            <a th:href="@{/vehicles/{id}(id=${vehicle.id})}" class="btn btn-primary w-100">
                                <i class="bi bi-eye"></i> Voir les détails
                            </a>
                        </div>
                    </div>
                </div>
            </div>
         <div class="mt-4">
    <div th:replace="~{fragments/pagination :: pagination(${currentPage}, ${totalPages})}"></div>
</div>
        </div>
    </div>
</main>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
