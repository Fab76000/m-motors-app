<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Footer</title>
</head>
<body>

<footer th:fragment="footer" class="bg-dark text-white mt-5 py-4">
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="h5">
                    <i class="bi bi-car-front-fill" aria-hidden="true"></i> M-Motors
                </div>
                <p class="text-white">
                    Spécialiste de la vente et location de véhicules d'occasion depuis 1987.
                </p>
            </div>
            <div class="col-md-4">
                <div class="h5">Contact</div>
                <p class="text-white mb-1">
                    <i class="bi bi-envelope" aria-hidden="true"></i> contact@m-motors.fr
                </p>
                <p class="text-white mb-1">
                    <i class="bi bi-telephone" aria-hidden="true"></i> xx xx xx xx xx
                </p>
                <p class="text-white">
                    <i class="bi bi-geo-alt" aria-hidden="true"></i> France
                </p>
            </div>
        </div>
        <hr class="border-secondary">
        <div class="row">
            <div class="col text-center text-white">
                <small>
                    © <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> M-Motors. Tous droits réservés.
                </small>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
